<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>こころんと整える 7日間ジャーナル</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7b68c4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="こころんジャーナル">
<link rel="apple-touch-icon" href="images/kokoron_cover.png">

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Shippori+Mincho:wght@400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
<style>
/* ===== CSS変数 ===== */
:root {
  --cream:      #faf8f4;
  --lav:        #ede8f7;
  --lav-mid:    #c9bfe8;
  --lav-dark:   #7b68c4;
  --lav-deep:   #5a4aa0;
  --sage:       #8aaa7e;
  --sage-light: #d4e8ce;
  --gold:       #e8c84a;
  --text:       #3a2e4a;
  --text-mid:   #6a5a7a;
  --text-light: #9888b0;
  --border:     #ddd4f0;
  --white:      #ffffff;
  --morning-bg: #fff9f5;
  --evening-bg: #f5f0fa;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #e0d8f0;
  color: var(--text);
  -webkit-text-size-adjust: 100%;
}

/* ===== 印刷設定 ===== */
@media print {
  body { background: white; }
  .no-print { display: none !important; }
  .spread { box-shadow: none !important; page-break-after: always; break-after: page; flex-direction: row !important; }
  .cover  { page-break-after: always; break-after: page; }
  textarea { border: none !important; border-bottom: 1px solid #ddd !important; resize: none; }
}
@page { size: A4 landscape; margin: 8mm; }

/* ===== サイズ切り替えボタン ===== */
.size-switcher {
  position: fixed; top: 12px; right: 12px; z-index: 200;
  display: flex; gap: 8px;
}
.size-btn {
  padding: 8px 16px; border-radius: 20px; border: none; cursor: pointer;
  font-size: 13px; font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--lav-mid); color: var(--lav-deep); font-weight: 700;
  transition: background .2s; -webkit-tap-highlight-color: transparent;
  box-shadow: 0 2px 8px rgba(90,74,160,.15);
}
.size-btn.active, .size-btn:hover { background: var(--lav-dark); color: white; }

/* ===== 表紙 ===== */
.cover {
  width: 100%; max-width: 700px; margin: 64px auto 20px;
  background: linear-gradient(135deg, var(--lav) 0%, var(--sage-light) 60%, var(--cream) 100%);
  border-radius: 20px;
  box-shadow: 0 8px 40px rgba(90,74,160,.2);
  padding: 48px 32px 40px;
  display: flex; flex-direction: column; align-items: center;
  text-align: center; position: relative; overflow: hidden;
}
.cover::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 20% 30%, rgba(201,191,232,.4) 0%, transparent 50%),
              radial-gradient(circle at 80% 70%, rgba(138,170,126,.3) 0%, transparent 50%);
}
.cover-kokoron {
  width: 130px; height: 130px; object-fit: contain;
  mix-blend-mode: multiply; margin-bottom: 16px; position: relative;
}
.cover-title-en {
  font-family: 'Dancing Script', cursive;
  font-size: 20px; color: var(--lav-dark); margin-bottom: 8px; position: relative;
}
.cover-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 28px; font-weight: 600; color: var(--text);
  line-height: 1.5; margin-bottom: 12px; position: relative;
}
.cover-title span { color: var(--lav-deep); }
.cover-sub {
  font-size: 13px; color: var(--text-mid); line-height: 2; position: relative;
}
.cover-deco { position: absolute; font-size: 24px; opacity: .4; }
.cover-deco.d1 { top: 20px; left: 24px; }
.cover-deco.d2 { top: 16px; right: 32px; font-size: 18px; }
.cover-deco.d3 { bottom: 20px; left: 20px; font-size: 16px; }
.cover-deco.d4 { bottom: 16px; right: 24px; }
.cover-how {
  margin-top: 20px; padding: 14px 20px;
  background: rgba(255,255,255,.65); border-radius: 12px;
  font-size: 13px; color: var(--text-mid); line-height: 2.1;
  position: relative; max-width: 360px;
}
.cover-how strong { color: var(--lav-deep); }

/* ===== デイナビゲーション ===== */
.day-nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; justify-content: center; gap: 6px;
  padding: 10px 12px;
  background: rgba(224,216,240,.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.day-nav-btn {
  padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border);
  font-size: 12px; cursor: pointer; background: white; color: var(--text-mid);
  font-family: 'Zen Maru Gothic', sans-serif; transition: all .2s;
  -webkit-tap-highlight-color: transparent;
  min-height: 36px;
}
.day-nav-btn:hover, .day-nav-btn.active {
  background: var(--lav-dark); color: white; border-color: var(--lav-dark);
}

/* ===== 見開きスプレッド ===== */
.spread {
  display: flex;
  width: 100%; max-width: 900px;
  margin: 0 auto 24px;
  box-shadow: 0 6px 32px rgba(90,74,160,.16);
  border-radius: 12px; overflow: hidden;
}
.spine {
  width: 10px;
  background: linear-gradient(to bottom, var(--lav-mid), var(--sage), var(--lav-mid));
  flex-shrink: 0;
}

/* ===== ページ共通 ===== */
.page {
  flex: 1; padding: 20px 18px 76px; position: relative;
  min-height: 560px;
}
.page-morning { background: var(--morning-bg); }
.page-evening { background: var(--evening-bg); }

/* ===== ページヘッダー ===== */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1.5px solid var(--border);
}
.page-label {
  font-family: 'Dancing Script', cursive;
  font-size: 18px; color: var(--lav-dark);
}
.day-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--lav-mid); color: var(--lav-deep);
  font-size: 10px; font-weight: 700;
  flex-direction: column; line-height: 1.2; flex-shrink: 0;
}
.day-badge .num { font-size: 13px; font-weight: 700; }

/* DATE行 */
.date-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px; font-size: 11px; color: var(--text-mid); flex-wrap: wrap;
}
input.date-input {
  border: none; border-bottom: 1px solid var(--lav-mid);
  background: transparent; font-size: 12px; color: var(--text);
  font-family: 'Zen Maru Gothic', sans-serif;
  padding: 2px 4px; outline: none; width: 130px;
}
.dow-pills { display: flex; gap: 3px; flex-wrap: wrap; }
.dow {
  border: 1px solid var(--border); border-radius: 20px;
  padding: 2px 6px; font-size: 10px; color: var(--text-light);
  cursor: pointer; transition: all .15s; -webkit-tap-highlight-color: transparent;
}
.dow.sel { background: var(--lav-mid); border-color: var(--lav-dark); color: var(--lav-deep); font-weight: 700; }

/* テーマバナー */
.theme-banner {
  background: linear-gradient(90deg, var(--lav) 0%, var(--sage-light) 100%);
  border-radius: 8px; padding: 8px 12px;
  margin-bottom: 12px;
}
.theme-day { font-size: 9px; font-weight: 700; color: var(--lav-deep); letter-spacing: .08em; }
.theme-text {
  font-family: 'Shippori Mincho', serif;
  font-size: 14px; font-weight: 600; color: var(--text);
}

/* セクション */
.section { margin-bottom: 12px; }
.section-label {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700; color: var(--lav-deep);
  margin-bottom: 6px; letter-spacing: .04em;
}
.section-label .en { font-size: 9px; color: var(--text-light); font-weight: 400; margin-left: 2px; }

/* 天気・心もようアイコン */
.weather-row { display: flex; gap: 8px; flex-wrap: wrap; }
.weather-item {
  display: flex; flex-direction: column; align-items: center;
  font-size: 20px; cursor: pointer; opacity: .45; transition: opacity .2s, transform .2s;
  -webkit-tap-highlight-color: transparent;
  min-width: 36px; padding: 4px;
}
.weather-item span { font-size: 9px; color: var(--text-light); margin-top: 2px; }
.weather-item.sel { opacity: 1; transform: scale(1.15); }

/* 気分チップ */
.mood-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  border: 1.5px solid var(--border); border-radius: 20px;
  padding: 5px 10px; font-size: 12px; color: var(--text-mid);
  cursor: pointer; transition: background .2s, border-color .2s;
  -webkit-tap-highlight-color: transparent;
}
.chip:hover, .chip.active {
  background: var(--lav); border-color: var(--lav-dark); color: var(--lav-deep);
}

/* ===== テキストエリア（入力欄）===== */
textarea.write-area {
  width: 100%;
  border: none;
  border-bottom: 1.5px solid var(--border);
  background: transparent;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 13px;
  color: var(--text);
  resize: none;
  outline: none;
  padding: 5px 2px;
  line-height: 1.9;
  display: block;
  margin-bottom: 4px;
  -webkit-appearance: none;
}
textarea.write-area:focus {
  border-bottom-color: var(--lav-dark);
  background: rgba(237,232,247,.2);
  border-radius: 4px 4px 0 0;
}
textarea.write-area::placeholder { color: #c8bfe0; font-size: 11px; }

/* ボックス系 */
.step-box {
  border: 1.5px dashed var(--sage); border-radius: 8px;
  padding: 8px 10px; background: rgba(138,170,126,.07);
}
.step-box .step-label { font-size: 10px; color: var(--sage); font-weight: 700; margin-bottom: 4px; display: block; }

.affirmation-box {
  background: var(--lav); border-radius: 8px; padding: 8px 10px;
}
.affirmation-box .af-label { font-size: 10px; color: var(--lav-deep); font-weight: 700; margin-bottom: 4px; display: block; }
.affirmation-box textarea.write-area { border-bottom-color: var(--lav-mid); }

/* 夜ページ */
.evening-accent { width: 28px; height: 3px; background: linear-gradient(90deg, var(--lav-dark), var(--sage)); border-radius: 2px; margin-bottom: 12px; }

.checklist { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.check-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-mid); }
.check-box {
  width: 18px; height: 18px; border: 1.5px solid var(--lav-mid);
  border-radius: 4px; flex-shrink: 0; background: var(--white);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 11px; transition: background .15s;
  -webkit-tap-highlight-color: transparent;
}
.check-box.checked { background: var(--lav-dark); color: white; border-color: var(--lav-dark); }

.gratitude-box { border-left: 2.5px solid var(--gold); padding-left: 8px; }
.gratitude-box textarea.write-area { border-bottom-color: rgba(232,200,74,.4); }

.heart-moment {
  background: var(--lav); border-radius: 8px; padding: 8px 10px;
}
.heart-moment .hm-label { font-size: 10px; color: var(--lav-deep); font-weight: 700; margin-bottom: 4px; display: block; }
.heart-moment textarea.write-area { border-bottom-color: var(--lav-mid); }

.self-message {
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 8px 10px; background: var(--white);
}
.self-message .sm-label { font-size: 10px; color: var(--lav-deep); font-weight: 700; margin-bottom: 4px; display: block; }

/* スター */
.mood-stars { display: flex; gap: 4px; }
.star { font-size: 22px; color: var(--border); cursor: pointer; transition: color .15s;
  -webkit-tap-highlight-color: transparent; }
.star.lit { color: var(--gold); }

/* こころんメッセージフッター */
.kokoron-msg {
  position: absolute; bottom: 12px; left: 16px; right: 16px;
  background: linear-gradient(90deg, rgba(237,232,247,.9), rgba(212,232,206,.7));
  border-radius: 10px; padding: 8px 12px;
  display: flex; align-items: center; gap: 8px;
}
.kokoron-img {
  width: 44px; height: 44px; object-fit: contain;
  mix-blend-mode: multiply; flex-shrink: 0;
}
.msg-text {
  font-family: 'Shippori Mincho', serif;
  font-size: 11px; color: var(--text-mid);
  line-height: 1.7; font-style: italic;
}

/* ===== データリセットボタン ===== */
.reset-bar {
  text-align: center; padding: 8px; margin-bottom: 8px;
}
.reset-btn {
  background: none; border: 1px solid var(--border); border-radius: 20px;
  font-size: 11px; color: var(--text-light); padding: 4px 12px;
  cursor: pointer; font-family: 'Zen Maru Gothic', sans-serif;
}

/* ===== レスポンシブ（スマホ）===== */
@media (max-width: 680px) {
  .cover { margin-top: 56px; padding: 36px 20px 32px; }
  .cover-title { font-size: 24px; }

  /* 見開き → 縦積み */
  .spread {
    flex-direction: column;
    border-radius: 12px;
    margin: 0 8px 20px;
  }
  .spine {
    width: 100%; height: 6px;
    background: linear-gradient(to right, var(--lav-mid), var(--sage), var(--lav-mid));
  }
  .page {
    min-height: auto;
    padding: 20px 16px 80px;
  }

  /* チェックリストを1列に */
  .checklist { grid-template-columns: 1fr; }

  /* 入力しやすいサイズに */
  textarea.write-area { font-size: 15px; padding: 6px 2px; }
  .chip { font-size: 13px; padding: 6px 12px; }
  .weather-item { font-size: 22px; min-width: 40px; }
  .check-box { width: 22px; height: 22px; font-size: 13px; }
  .star { font-size: 26px; }
  .theme-text { font-size: 15px; }

  /* ナビをコンパクトに */
  .day-nav { gap: 5px; padding: 8px 8px; }
  .day-nav-btn { padding: 6px 10px; font-size: 11px; }
}
</style>
</head>
<body>

<!-- サイズ切り替え -->
<div class="size-switcher no-print">
  <button class="size-btn active" onclick="setSize('screen',this)">🖥 画面</button>
  <button class="size-btn" onclick="window.print()">🖨 印刷/PDF</button>
</div>

<!-- ===== 表紙 ===== -->
<div class="cover no-print">
  <span class="cover-deco d1">🌿</span>
  <span class="cover-deco d2">✦</span>
  <span class="cover-deco d3">✧</span>
  <span class="cover-deco d4">🌿</span>
  <img class="cover-kokoron" src="images/kokoron_cover.png" alt="こころん">
  <div class="cover-title-en">Kokoron's Mindful Journal</div>
  <div class="cover-title"><span>こころん</span>と整える<br>7日間ジャーナル</div>
  <div class="cover-sub">
    🌿 朝と夜、1日2ページ · 7日間テーマ付き<br>
    瞑想 × ジャーナリング × セルフケア
  </div>
  <div class="cover-how">
    <strong>このノートの使い方</strong><br>
    朝ページ → 今日の気持ちを整える<br>
    夜ページ → 今日を振り返り、自分をねぎらう<br>
    書けない日があっても大丈夫🦥
  </div>
</div>

<!-- ===== デイナビゲーション ===== -->
<div class="day-nav no-print" id="dayNav"></div>

<!-- ===== 7日分スプレッド (JSで生成) ===== -->
<div id="journal"></div>

<!-- リセット -->
<div class="reset-bar no-print">
  <button class="reset-btn" onclick="confirmReset()">🗑 書いた内容をすべてリセット</button>
</div>

<!-- ブランドフッター -->
<div style="text-align:center;padding:8px 0 40px;font-size:11px;color:#9888b0;" class="no-print">
  🦥 Loves Life｜モカ&こころん — こころんと整える7日間ジャーナル
</div>

<script>
// ===== データ定義 =====
const IMAGES = [
  'kokoron_01.png','kokoron_02.png','kokoron_03.png','kokoron_04.png',
  'kokoron_05.png','kokoron_06.png','kokoron_07.png'
];
const IMG_BASE = 'images/';

const DAYS = [
  { day:1, theme:'いまの自分を感じる',
    morning_msg:'ちゃんと感じられてるよ。\nそれだけで、十分だよ🌿',
    evening_msg:'今日はここまででも大丈夫。\nおやすみなさい🌙' },
  { day:2, theme:'安心できる時間',
    morning_msg:'あなたのペースで\n整えばいいよ🌿',
    evening_msg:'今日も生きてくれて\nありがとう🌙' },
  { day:3, theme:'呼吸を感じる',
    morning_msg:'深呼吸、それだけで\n十分だよ🌿',
    evening_msg:'書けない日があっても\nいいんだよ🌙' },
  { day:4, theme:'頭の中を休ませる',
    morning_msg:'頭を空っぽにして\nいいんだよ🌿',
    evening_msg:'ゆっくり休んでね。\nおやすみ🌙' },
  { day:5, theme:'本当はどうしたい？',
    morning_msg:'答えは急がなくて\nいいよ🌿',
    evening_msg:'今日の自分を\nそのまま受け取って🌙' },
  { day:6, theme:'好きなものを思い出す',
    morning_msg:'好きを感じる時間、\n大切にしてね🌿',
    evening_msg:'自分を好きでいて\nくれてありがとう🌙' },
  { day:7, theme:'7日間の自分をねぎらう',
    morning_msg:'7日間、ここまで\nよく来たね🌿',
    evening_msg:'おつかれさま。\nあなたはすごいよ🌙' }
];

const WEATHER_MORNING = [
  {e:'☀️',l:'すっきり'},{e:'🌤',l:'まあまあ'},{e:'☁️',l:'もやもや'},{e:'🌧',l:'しんどい'},{e:'🌙',l:'しずか'}
];
const WEATHER_EVENING = [
  {e:'🌙',l:'おだやか'},{e:'✨',l:'すっきり'},{e:'😴',l:'ねむい'},{e:'☁️',l:'もやもや'},{e:'🫧',l:'ほっとした'}
];
const MOOD_CHIPS = ['😊 おだやか','✨ わくわく','😶 もやもや','😴 つかれた','💪 がんばれそう','🫧 その他'];
const SELF_CARE = ['水を飲んだ','深呼吸した','外の空気を吸った','ちゃんと休んだ','誰かと話した','ジャーナリングした','自分を責めなかった','その他'];

// ===== HTML生成 =====
function weatherItems(arr, prefix) {
  return arr.map(w =>
    `<div class="weather-item" onclick="selWeather(this,'${prefix}')" data-group="${prefix}">
      ${w.e}<span>${w.l}</span>
    </div>`
  ).join('');
}

function moodChipHtml() {
  return MOOD_CHIPS.map(c =>
    `<div class="chip" onclick="this.classList.toggle('active')">${c}</div>`
  ).join('');
}

function checkHtml(dayNum) {
  return SELF_CARE.map((item, i) =>
    `<div class="check-item">
      <div class="check-box" data-key="d${dayNum}_check_${i}" onclick="toggleCheck(this)"></div>
      <span>${item}</span>
    </div>`
  ).join('');
}

function starsHtml(dayNum) {
  return Array(5).fill(0).map((_,i) =>
    `<span class="star" data-idx="${i}" data-day="${dayNum}" onclick="setStars(this,${dayNum})">★</span>`
  ).join('');
}

function ta(key, rows, placeholder) {
  return `<textarea class="write-area" rows="${rows}" data-key="${key}" placeholder="${placeholder}"></textarea>`;
}

function buildSpread(d, idx) {
  const img = IMG_BASE + IMAGES[idx % IMAGES.length];
  const mMsg = d.morning_msg.replace(/\n/g,'<br>');
  const eMsg = d.evening_msg.replace(/\n/g,'<br>');
  const mpfx = `m${d.day}`, epfx = `e${d.day}`;
  const n = d.day;

  return `
<div class="spread" id="day${n}">

  <!-- 朝ページ -->
  <div class="page page-morning">
    <div class="page-header">
      <div class="page-label">☀️ Morning</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="font-size:9px;color:var(--text-light);">DATE</div>
        <input type="date" class="date-input" data-key="d${n}_date">
        <div class="day-badge"><span class="num">${n}</span><span style="font-size:7px;font-weight:400;">Day</span></div>
      </div>
    </div>
    <div class="date-row">
      <div class="dow-pills" id="dow${n}">
        ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="dow" onclick="selDow(this,'dow${n}')">${d}</div>`).join('')}
      </div>
    </div>
    <div class="theme-banner">
      <div class="theme-day">DAY ${n} · TODAY'S THEME</div>
      <div class="theme-text">「 ${d.theme} 」</div>
    </div>

    <div class="section">
      <div class="section-label">🌤 今日の空もよう <span class="en">/ How's the weather in your heart?</span></div>
      <div class="weather-row">${weatherItems(WEATHER_MORNING, mpfx)}</div>
    </div>

    <div class="section">
      <div class="section-label">💭 今日の心に近いのは？</div>
      <div class="mood-chips">${moodChipHtml()}</div>
    </div>

    <div class="section">
      <div class="section-label">🌱 今日のありがとう <span class="en">/ Gratitude</span></div>

}

// ===== レンダリング =====
const journal = document.getElementById('journal');
const nav = document.getElementById('dayNav');

DAYS.forEach((d, idx) => {
  journal.innerHTML += buildSpread(d, idx);
  const btn = document.createElement('button');
  btn.className = 'day-nav-btn' + (idx === 0 ? ' active' : '');
  btn.textContent = `Day ${d.day}`;
  btn.onclick = () => {
    document.querySelectorAll('.day-nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`day${d.day}`).scrollIntoView({ behavior:'smooth', block:'start' });
  };
  nav.appendChild(btn);
});

// ===== LocalStorage 保存・復元 =====
function saveKey(key, value) {
  try { localStorage.setItem('kokoron_' + key, value); } catch(e) {}
}
function loadKey(key) {
  try { return localStorage.getItem('kokoron_' + key) || ''; } catch(e) { return ''; }
}

// テキストエリア・日付入力の復元＆保存
document.querySelectorAll('textarea.write-area, input.date-input').forEach(el => {
  const key = el.dataset.key;
  if (!key) return;
  el.value = loadKey(key);
  el.addEventListener('input', () => saveKey(key, el.value));
});

// チェックボックス復元
document.querySelectorAll('.check-box[data-key]').forEach(el => {
  const key = el.dataset.key;
  if (loadKey(key) === '1') {
    el.classList.add('checked');
    el.textContent = '✓';
  }
});

// ===== インタラクション =====
function selWeather(el, group) {
  document.querySelectorAll(`[data-group="${group}"]`).forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
}

function selDow(el, groupId) {
  document.querySelectorAll(`#${groupId} .dow`).forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
}

function toggleCheck(el) {
  el.classList.toggle('checked');
  el.textContent = el.classList.contains('checked') ? '✓' : '';
  const key = el.dataset.key;
  if (key) saveKey(key, el.classList.contains('checked') ? '1' : '0');
}

function setStars(el, dayNum) {
  const idx = parseInt(el.dataset.idx);
  document.querySelectorAll(`#stars${dayNum} .star`).forEach((s,i) => {
    s.classList.toggle('lit', i <= idx);
  });
  saveKey(`d${dayNum}_stars`, idx);
}

// スター復元
DAYS.forEach(d => {
  const saved = loadKey(`d${d.day}_stars`);
  if (saved !== '') {
    const idx = parseInt(saved);
    document.querySelectorAll(`#stars${d.day} .star`).forEach((s,i) => {
      s.classList.toggle('lit', i <= idx);
    });
  }
});

function setSize(mode, btn) {
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function confirmReset() {
  if (confirm('書いた内容をすべてリセットしますか？\nこの操作は元に戻せません。')) {
    try {
      Object.keys(localStorage).filter(k => k.startsWith('kokoron_')).forEach(k => localStorage.removeItem(k));
    } catch(e) {}
    location.reload();
  }
}

// ===== PWA Service Worker 登録 =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
